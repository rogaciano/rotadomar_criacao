<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minhas Coletas - Motorista</title>
    <meta name="version" content="260319.1">
    <link rel="manifest" href="/motorista/manifest.json?v=260319.1">
    <link rel="icon" type="image/svg+xml" href="/motorista/icons/icon-192.svg">
    <link rel="apple-touch-icon" href="/motorista/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .pull-indicator { transition: transform 0.2s; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen">

<div x-data="motoristaApp()" x-init="init()" class="max-w-lg mx-auto pb-20">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-slate-900/95 backdrop-blur-md border-b border-slate-800 px-4 py-3">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-white font-bold text-sm leading-tight">Minhas Coletas</h1>
                    <p class="text-slate-400 text-xs" x-text="user?.name || ''"></p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button @click="loadColetas()" class="p-2 text-slate-400 hover:text-white transition-colors" title="Atualizar">
                    <svg class="w-5 h-5" :class="{ 'loading-spinner': loading }" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                </button>
                <button @click="doLogout()" class="p-2 text-slate-400 hover:text-red-400 transition-colors" title="Sair">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex mt-3 bg-slate-800 rounded-lg p-0.5">
            <button @click="tab = 'disponiveis'; loadDisponiveis()"
                    :class="tab === 'disponiveis' ? 'bg-orange-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'"
                    class="flex-1 py-2 text-xs font-bold rounded-md transition-all">
                Disponíveis
                <span x-show="disponiveis.length > 0 && tab === 'disponiveis'" x-text="'(' + disponiveis.length + ')'" class="ml-1"></span>
            </button>
            <button @click="tab = 'ativas'; loadColetas()"
                    :class="tab === 'ativas' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'"
                    class="flex-1 py-2 text-xs font-bold rounded-md transition-all">
                Ativas
                <span x-show="coletas.length > 0 && tab === 'ativas'" x-text="'(' + coletas.length + ')'" class="ml-1"></span>
            </button>
            <button @click="tab = 'historico'; loadColetas()"
                    :class="tab === 'historico' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'"
                    class="flex-1 py-2 text-xs font-bold rounded-md transition-all">
                Histórico
            </button>
        </div>
    </header>

    <!-- Toast message -->
    <div x-show="toast.show" x-transition
         :class="toast.type === 'success' ? 'bg-green-900/90 border-green-700 text-green-200' : 'bg-red-900/90 border-red-700 text-red-200'"
         class="fixed top-20 left-4 right-4 max-w-lg mx-auto z-50 p-3 rounded-lg border text-sm font-medium text-center"
         x-text="toast.message"
         style="display: none;">
    </div>

    <!-- Loading -->
    <div x-show="loading" class="flex flex-col items-center justify-center py-20">
        <svg class="loading-spinner w-10 h-10 text-indigo-500 mb-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <p class="text-slate-400 text-sm">Carregando...</p>
    </div>

    <!-- Error -->
    <div x-show="error && !loading" class="p-4">
        <div class="bg-red-900/30 border border-red-800 rounded-xl p-4 text-center">
            <svg class="w-10 h-10 text-red-400 mx-auto mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
            </svg>
            <p class="text-red-300 text-sm mb-3" x-text="error"></p>
            <button @click="tab === 'disponiveis' ? loadDisponiveis() : loadColetas()" class="px-4 py-2 bg-red-800 hover:bg-red-700 text-red-200 text-xs font-bold rounded-lg transition-colors">
                Tentar novamente
            </button>
        </div>
    </div>

    <!-- ==================== DISPONÍVEIS TAB ==================== -->
    <div x-show="tab === 'disponiveis' && !loading && !error">
        <!-- Empty disponíveis -->
        <div x-show="disponiveis.length === 0" class="p-4">
            <div class="bg-slate-800 rounded-2xl p-8 text-center border border-slate-700">
                <div class="w-16 h-16 bg-slate-700 rounded-full mx-auto mb-4 flex items-center justify-center">
                    <svg class="w-8 h-8 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                </div>
                <p class="text-white font-semibold mb-1">Nenhum produto disponível</p>
                <p class="text-slate-400 text-sm">Todos os produtos já foram agendados para coleta.</p>
            </div>
        </div>

        <!-- Disponíveis list -->
        <div x-show="disponiveis.length > 0" class="p-4 space-y-5">
            <template x-for="grupo in disponiveisAgrupados" :key="grupo.localizacao + '-' + grupo.localizacaoId">
                <div class="space-y-3">
                    <div class="px-1">
                        <div class="flex items-center justify-between gap-3 mb-1">
                            <h2 class="text-sm font-extrabold tracking-wide text-orange-300 uppercase" x-text="grupo.localizacao"></h2>
                            <span class="shrink-0 px-2.5 py-1 rounded-full text-[10px] font-bold uppercase bg-slate-800 border border-orange-700/40 text-orange-300" x-text="grupo.produtos.length + ' produto' + (grupo.produtos.length === 1 ? '' : 's')"></span>
                        </div>
                        <p class="text-slate-500 text-[11px]" x-text="'Produtos aguardando retirada nesta localidade'">
                        </p>
                    </div>

                    <template x-for="prod in grupo.produtos" :key="prod.id">
                        <div class="bg-slate-800 rounded-2xl border border-orange-700/30 overflow-hidden shadow-lg">
                            <div class="px-4 py-3 bg-orange-900/20 flex items-center justify-between">
                                <div class="flex items-center gap-2">
                                    <span class="text-lg">📦</span>
                                    <div>
                                        <p class="text-white font-bold text-sm" x-text="'Ref. ' + prod.referencia"></p>
                                        <p class="text-slate-400 text-xs" x-text="prod.descricao"></p>
                                    </div>
                                </div>
                                <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase bg-orange-900/50 text-orange-300 border border-orange-700">
                                    Disponível
                                </span>
                            </div>
                            <div class="px-4 py-3">
                                <div class="grid grid-cols-2 gap-2 mb-3">
                                    <div class="bg-slate-700/50 rounded-lg p-2 text-center">
                                        <p class="text-slate-500 text-[10px] font-bold uppercase">Qtd</p>
                                        <p class="text-white font-bold text-sm" x-text="prod.quantidade"></p>
                                    </div>
                                    <div class="bg-slate-700/50 rounded-lg p-2 text-center">
                                        <p class="text-slate-500 text-[10px] font-bold uppercase">Esperando</p>
                                        <p class="text-white font-bold text-xs" x-text="prod.aguardando_desde"></p>
                                    </div>
                                </div>
                                <div class="mb-3 bg-slate-700/40 rounded-lg px-3 py-2">
                                    <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Localidade</p>
                                    <p class="text-white font-bold text-sm" x-text="prod.origem_nome_completo || prod.origem"></p>
                                </div>
                                <button @click="openAgendar(prod)"
                                        class="w-full py-2.5 bg-orange-600 hover:bg-orange-700 text-white font-bold text-sm rounded-xl transition-colors flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    Agendar Coleta
                                </button>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>

    <!-- ==================== MODAL AGENDAR ==================== -->
    <div x-show="modalAgendar" x-transition.opacity
         class="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm p-0"
         @click.self="modalAgendar = false" style="display: none;">
        <div x-show="modalAgendar" x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="translate-y-full" x-transition:enter-end="translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="translate-y-0" x-transition:leave-end="translate-y-full"
             class="bg-slate-800 w-full max-w-lg rounded-t-3xl border-t border-slate-700 shadow-2xl max-h-[85vh] overflow-y-auto">

            <!-- Modal Header -->
            <div class="sticky top-0 bg-slate-800 px-4 py-4 border-b border-slate-700 flex items-center justify-between rounded-t-3xl z-10">
                <div>
                    <h3 class="text-white font-bold">Agendar Coleta</h3>
                    <p class="text-slate-400 text-xs" x-text="'Ref. ' + (agendarProduto?.referencia || '')"></p>
                </div>
                <button @click="modalAgendar = false" class="p-2 text-slate-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-4 space-y-4">
                <!-- Info do produto -->
                <div class="bg-slate-700/50 rounded-xl p-3 flex items-center gap-3">
                    <span class="text-2xl">📦</span>
                    <div>
                        <p class="text-white font-bold text-sm" x-text="agendarProduto?.descricao"></p>
                        <p class="text-slate-400 text-xs" x-text="'Origem: ' + (agendarProduto?.origem || '') + ' · Qtd: ' + (agendarProduto?.quantidade || 0)"></p>
                    </div>
                </div>

                <!-- Veículo -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Veículo</label>
                    <select x-model="agendarForm.veiculo_id"
                            class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                        <option value="">Selecione...</option>
                        <template x-for="v in veiculosList" :key="v.id">
                            <option :value="v.id" x-text="v.placa + (v.descricao ? ' - ' + v.descricao : '')"></option>
                        </template>
                    </select>
                </div>

                <!-- Destino -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Destino</label>
                    <select x-model="agendarForm.destino_localizacao_id"
                            class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                        <option value="">Selecione...</option>
                        <template x-for="d in destinosList" :key="d.id">
                            <option :value="d.id" x-text="d.nome"></option>
                        </template>
                    </select>
                </div>

                <!-- Datas -->
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Saída prevista</label>
                        <input type="datetime-local" x-model="agendarForm.inicio_previsto_em"
                               class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Retorno previsto</label>
                        <input type="datetime-local" x-model="agendarForm.retorno_previsto_em"
                               class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
                    </div>
                </div>

                <!-- Observação -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-1.5">Observação (opcional)</label>
                    <textarea x-model="agendarForm.observacao" rows="2" placeholder="Ex: retirar pela manhã"
                              class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-xl text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500"></textarea>
                </div>

                <!-- Error -->
                <div x-show="agendarError" class="p-3 bg-red-900/50 border border-red-700 rounded-xl text-red-300 text-sm" x-text="agendarError"></div>

                <!-- Buttons -->
                <div class="flex gap-3 pb-2">
                    <button @click="modalAgendar = false" class="flex-1 py-3 bg-slate-700 text-slate-300 font-semibold rounded-xl">
                        Cancelar
                    </button>
                    <button @click="submitAgendar()" :disabled="agendarLoading"
                            class="flex-1 py-3 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-xl transition-colors disabled:opacity-50 flex items-center justify-center gap-2">
                        <span x-show="!agendarLoading">Agendar</span>
                        <span x-show="agendarLoading">Agendando...</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== COLETAS TABS (Ativas / Histórico) ==================== -->

    <!-- Empty state (coletas) -->
    <div x-show="tab !== 'disponiveis' && !loading && !error && coletas.length === 0" class="p-4">
        <div class="bg-slate-800 rounded-2xl p-8 text-center border border-slate-700">
            <div class="w-16 h-16 bg-slate-700 rounded-full mx-auto mb-4 flex items-center justify-center">
                <svg class="w-8 h-8 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                </svg>
            </div>
            <p class="text-white font-semibold mb-1" x-text="tab === 'ativas' ? 'Nenhuma coleta ativa' : 'Nenhuma coleta no histórico'"></p>
            <p class="text-slate-400 text-sm" x-text="tab === 'ativas' ? 'Vá em Disponíveis para agendar uma coleta.' : 'Coletas finalizadas aparecerão aqui.'"></p>
        </div>
    </div>

    <!-- Coletas List -->
    <div x-show="tab !== 'disponiveis' && (!loading || coletas.length > 0)" class="p-4 space-y-3">
        <template x-for="coleta in coletas" :key="coleta.id">
            <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden shadow-lg"
                 :class="{
                     'border-yellow-700/50': coleta.status === 'agendado',
                     'border-blue-700/50': coleta.status === 'em_transito',
                     'border-indigo-700/50': coleta.status === 'entregue',
                     'border-green-700/50': coleta.status === 'finalizado',
                     'border-slate-700': coleta.status === 'cancelado'
                 }">

                <!-- Card Header -->
                <div class="px-4 py-3 flex items-center justify-between"
                     :class="{
                         'bg-yellow-900/20': coleta.status === 'agendado',
                         'bg-blue-900/20': coleta.status === 'em_transito',
                         'bg-indigo-900/20': coleta.status === 'entregue',
                         'bg-green-900/20': coleta.status === 'finalizado',
                         'bg-slate-800': coleta.status === 'cancelado'
                     }">
                    <div class="flex items-center gap-2">
                        <span class="text-lg" x-text="coleta.status === 'agendado' ? '📋' : coleta.status === 'em_transito' ? '🚛' : coleta.status === 'entregue' ? '🏭' : coleta.status === 'finalizado' ? '✅' : '❌'"></span>
                        <div>
                            <p class="text-white font-bold text-sm" x-text="'Ref. ' + coleta.produto.referencia"></p>
                            <p class="text-slate-400 text-xs" x-text="coleta.produto.descricao"></p>
                        </div>
                    </div>
                    <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase"
                          :class="{
                              'bg-yellow-900/50 text-yellow-300 border border-yellow-700': coleta.status === 'agendado',
                              'bg-blue-900/50 text-blue-300 border border-blue-700': coleta.status === 'em_transito',
                              'bg-indigo-900/50 text-indigo-300 border border-indigo-700': coleta.status === 'entregue',
                              'bg-green-900/50 text-green-300 border border-green-700': coleta.status === 'finalizado',
                              'bg-slate-700 text-slate-400 border border-slate-600': coleta.status === 'cancelado'
                          }"
                          x-text="coleta.status_label || coleta.status">
                    </span>
                </div>

                <!-- Card Body -->
                <div class="px-4 py-3 space-y-2">
                    <!-- Rota -->
                    <div class="flex items-center gap-2">
                        <div class="flex flex-col items-center">
                            <div class="w-2.5 h-2.5 rounded-full bg-orange-500"></div>
                            <div class="w-px h-4 bg-slate-600"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                        </div>
                        <div class="flex-1 space-y-1">
                            <div class="flex items-center justify-between">
                                <p class="text-slate-300 text-xs font-semibold" x-text="coleta.origem.nome"></p>
                                <span class="text-slate-500 text-[10px]">ORIGEM</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <p class="text-slate-300 text-xs font-semibold" x-text="coleta.destino.nome"></p>
                                <span class="text-slate-500 text-[10px]">DESTINO</span>
                            </div>
                        </div>
                    </div>

                    <!-- Details -->
                    <div class="grid grid-cols-3 gap-2 pt-1">
                        <div class="bg-slate-700/50 rounded-lg p-2 text-center">
                            <p class="text-slate-500 text-[10px] font-bold uppercase">Qtd</p>
                            <p class="text-white font-bold text-sm" x-text="coleta.quantidade"></p>
                        </div>
                        <div class="bg-slate-700/50 rounded-lg p-2 text-center">
                            <p class="text-slate-500 text-[10px] font-bold uppercase">Veículo</p>
                            <p class="text-white font-bold text-sm" x-text="coleta.veiculo.placa"></p>
                        </div>
                        <div class="bg-slate-700/50 rounded-lg p-2 text-center">
                            <p class="text-slate-500 text-[10px] font-bold uppercase">Previsão</p>
                            <p class="text-white font-bold text-xs" x-text="coleta.inicio_previsto || '-'"></p>
                        </div>
                    </div>
                    <div class="bg-slate-700/30 rounded-lg p-2 mt-2">
                        <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Etapa atual</p>
                        <p class="text-white font-semibold text-sm" x-text="coleta.etapa_atual?.nome || '-' "></p>
                    </div>
                </div>

                <!-- Card Actions -->
                <div class="px-4 py-3 border-t border-slate-700/50">
                    <!-- Agendado: botão solicitar retirada -->
                    <template x-if="coleta.status === 'agendado'">
                        <div x-data="{ showObs: false, obs: '', submitting: false }">
                            <div x-show="!showObs">
                                <button @click="showObs = true"
                                        class="w-full py-2.5 bg-orange-600 hover:bg-orange-700 text-white font-bold text-sm rounded-xl transition-colors flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                                    </svg>
                                    Solicitar Retirada na Facção
                                </button>
                            </div>
                            <div x-show="showObs" class="space-y-2">
                                <textarea x-model="obs" rows="2" placeholder="Observação (opcional)"
                                          class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-orange-500"></textarea>
                                <div class="flex gap-2">
                                    <button @click="showObs = false" class="flex-1 py-2 bg-slate-700 text-slate-300 text-sm font-semibold rounded-lg">Cancelar</button>
                                    <button @click="submitting = true; $dispatch('solicitar-retirada', { id: coleta.id, obs: obs })"
                                            :disabled="submitting"
                                            class="flex-1 py-2 bg-orange-600 hover:bg-orange-700 text-white text-sm font-bold rounded-lg transition-colors disabled:opacity-50">
                                        <span x-show="!submitting">Confirmar</span>
                                        <span x-show="submitting">Enviando...</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Em Trânsito: botão confirmar entrega -->
                    <template x-if="coleta.status === 'em_transito'">
                        <div x-data="{ showObs: false, obs: '', submitting: false }">
                            <div x-show="!showObs">
                                <button @click="showObs = true"
                                        class="w-full py-2.5 bg-green-600 hover:bg-green-700 text-white font-bold text-sm rounded-xl transition-colors flex items-center justify-center gap-2">
                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                    </svg>
                                    Confirmar Entrega na Fábrica
                                </button>
                            </div>
                            <div x-show="showObs" class="space-y-2">
                                <textarea x-model="obs" rows="2" placeholder="Observação (opcional)"
                                          class="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>
                                <div class="flex gap-2">
                                    <button @click="showObs = false" class="flex-1 py-2 bg-slate-700 text-slate-300 text-sm font-semibold rounded-lg">Cancelar</button>
                                    <button @click="submitting = true; $dispatch('confirmar-entrega-fabrica', { id: coleta.id, obs: obs })"
                                            :disabled="submitting"
                                            class="flex-1 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg transition-colors disabled:opacity-50">
                                        <span x-show="!submitting">Confirmar</span>
                                        <span x-show="submitting">Enviando...</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </template>

                    <!-- Finalizado/Cancelado/Entregue: info timestamps -->
                    <template x-if="coleta.status === 'finalizado' || coleta.status === 'cancelado' || coleta.status === 'entregue'">
                        <div class="text-xs text-slate-500 flex items-center justify-between">
                            <span x-show="coleta.chegada_origem" x-text="'Chegada: ' + coleta.chegada_origem"></span>
                            <span x-show="coleta.recebido_destino" x-text="'Entrega: ' + coleta.recebido_destino"></span>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>

    <!-- Install PWA prompt -->
    <div x-show="installPrompt" x-transition
         class="fixed bottom-4 left-4 right-4 max-w-lg mx-auto bg-indigo-900/95 backdrop-blur border border-indigo-700 rounded-2xl p-4 z-50 shadow-2xl"
         style="display: none;">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                </svg>
            </div>
            <div class="flex-1">
                <p class="text-white text-sm font-bold">Instalar App</p>
                <p class="text-indigo-300 text-xs">Adicione à tela inicial para acesso rápido</p>
            </div>
            <button @click="installPWA()" class="px-3 py-1.5 bg-white text-indigo-700 text-xs font-bold rounded-lg">Instalar</button>
            <button @click="installPrompt = null" class="text-indigo-400 hover:text-white">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script src="/motorista/js/api.js?v=260319.1"></script>
<script src="/motorista/js/push.js?v=260319.1"></script>
<script>
    function motoristaApp() {
        return {
            user: API.getUser(),
            tab: 'disponiveis',
            coletas: [],
            disponiveis: [],
            veiculosList: [],
            destinosList: [],
            loading: false,
            error: null,
            toast: { show: false, message: '', type: 'success' },
            installPrompt: null,
            refreshInterval: null,

            // Modal agendar
            modalAgendar: false,
            agendarProduto: null,
            agendarForm: { veiculo_id: '', destino_localizacao_id: '', inicio_previsto_em: '', retorno_previsto_em: '', observacao: '' },
            agendarError: '',
            agendarLoading: false,

            async init() {
                if (!API.isAuthenticated()) {
                    window.location.href = '/motorista/index.html';
                    return;
                }

                await this.loadDisponiveis();

                // Auto-refresh every 30s
                this.refreshInterval = setInterval(() => {
                    if (this.tab === 'disponiveis') this.loadDisponiveis();
                    else this.loadColetas();
                }, 30000);

                // Listen for action events
                this.$el.addEventListener('solicitar-retirada', (e) => this.handleSolicitarRetirada(e.detail));
                this.$el.addEventListener('confirmar-entrega-fabrica', (e) => this.handleConfirmarEntregaFabrica(e.detail));

                // Push notifications
                if (typeof PushManager !== 'undefined') {
                    initPush();
                }

                // PWA install prompt
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    this.installPrompt = e;
                });
            },

            get disponiveisAgrupados() {
                const grupos = this.disponiveis.reduce((acc, prod) => {
                    const localizacao = prod.origem_nome_completo || prod.origem || 'Sem localidade';
                    const chave = `${prod.origem_id || 'sem-id'}::${localizacao}`;

                    if (!acc[chave]) {
                        acc[chave] = {
                            localizacao,
                            localizacaoId: prod.origem_id || null,
                            produtos: [],
                        };
                    }

                    acc[chave].produtos.push(prod);
                    return acc;
                }, {});

                return Object.values(grupos).sort((a, b) => a.localizacao.localeCompare(b.localizacao, 'pt-BR'));
            },

            async loadDisponiveis() {
                this.loading = true;
                this.error = null;
                try {
                    const data = await API.getDisponiveis();
                    if (data) this.disponiveis = data.produtos || [];
                } catch (err) {
                    this.error = err?.data?.message || 'Erro ao carregar produtos.';
                } finally {
                    this.loading = false;
                }
            },

            async openAgendar(prod) {
                this.agendarProduto = prod;
                this.agendarForm = { veiculo_id: '', destino_localizacao_id: '', inicio_previsto_em: '', retorno_previsto_em: '', observacao: '' };
                this.agendarError = '';
                this.agendarLoading = false;

                // Carregar veículos e destinos
                try {
                    const [vRes, dRes] = await Promise.all([API.getVeiculos(), API.getDestinos()]);
                    this.veiculosList = vRes?.veiculos || [];
                    this.destinosList = dRes?.destinos || [];
                } catch (e) {
                    this.veiculosList = [];
                    this.destinosList = [];
                }

                // Default: saída agora, retorno +4h
                const now = new Date();
                const ret = new Date(now.getTime() + 4 * 60 * 60 * 1000);
                this.agendarForm.inicio_previsto_em = this.toLocalDatetime(now);
                this.agendarForm.retorno_previsto_em = this.toLocalDatetime(ret);

                this.modalAgendar = true;
            },

            toLocalDatetime(date) {
                const pad = n => String(n).padStart(2, '0');
                return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}T${pad(date.getHours())}:${pad(date.getMinutes())}`;
            },

            async submitAgendar() {
                this.agendarError = '';
                if (!this.agendarForm.veiculo_id) { this.agendarError = 'Selecione um veículo.'; return; }
                if (!this.agendarForm.destino_localizacao_id) { this.agendarError = 'Selecione um destino.'; return; }
                if (!this.agendarForm.inicio_previsto_em) { this.agendarError = 'Informe a saída prevista.'; return; }
                if (!this.agendarForm.retorno_previsto_em) { this.agendarError = 'Informe o retorno previsto.'; return; }

                this.agendarLoading = true;
                try {
                    const data = await API.agendarColeta({
                        produto_localizacao_id: this.agendarProduto.id,
                        veiculo_id: parseInt(this.agendarForm.veiculo_id),
                        destino_localizacao_id: parseInt(this.agendarForm.destino_localizacao_id),
                        inicio_previsto_em: this.agendarForm.inicio_previsto_em,
                        retorno_previsto_em: this.agendarForm.retorno_previsto_em,
                        observacao: this.agendarForm.observacao,
                    });
                    this.modalAgendar = false;
                    this.showToast(data?.message || 'Coleta agendada!', 'success');
                    await this.loadDisponiveis();
                } catch (err) {
                    this.agendarError = err?.data?.message || err?.data?.errors ? Object.values(err.data.errors).flat().join(' ') : 'Erro ao agendar.';
                } finally {
                    this.agendarLoading = false;
                }
            },

            async loadColetas() {
                this.loading = true;
                this.error = null;

                try {
                    const data = await API.getColetas(this.tab === 'ativas' ? 'ativas' : 'historico');
                    if (data) {
                        this.coletas = data.coletas || [];
                    }
                } catch (err) {
                    this.error = err?.data?.message || 'Erro ao carregar coletas.';
                } finally {
                    this.loading = false;
                }
            },

            async handleSolicitarRetirada({ id, obs }) {
                try {
                    const data = await API.solicitarRetirada(id, obs);
                    this.showToast(data?.message || 'Retirada solicitada!', 'success');
                    await this.loadColetas();
                } catch (err) {
                    this.showToast(err?.data?.message || 'Erro ao solicitar retirada.', 'error');
                }
            },

            async handleConfirmarEntregaFabrica({ id, obs }) {
                try {
                    const data = await API.confirmarEntregaFabrica(id, obs);
                    this.showToast(data?.message || 'Entrega na fábrica confirmada!', 'success');
                    await this.loadColetas();
                } catch (err) {
                    this.showToast(err?.data?.message || 'Erro ao confirmar entrega.', 'error');
                }
            },

            showToast(message, type = 'success') {
                this.toast = { show: true, message, type };
                setTimeout(() => { this.toast.show = false; }, 4000);
            },

            async doLogout() {
                if (confirm('Deseja sair do app?')) {
                    await API.logout();
                    window.location.href = '/motorista/index.html';
                }
            },

            async installPWA() {
                if (this.installPrompt) {
                    this.installPrompt.prompt();
                    const result = await this.installPrompt.userChoice;
                    this.installPrompt = null;
                }
            },
        };
    }
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Motorista - Rota do Marr</title>
    <meta name="version" content="260319.1">
    <link rel="manifest" href="/motorista/manifest.json?v=260319.1">
    <link rel="icon" type="image/svg+xml" href="/motorista/icons/icon-192.svg">
    <link rel="apple-touch-icon" href="/motorista/icons/icon-192.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-sm">
        <!-- Logo + Title -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <svg class="w-10 h-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">Rota do Mar</h1>
            <p class="text-slate-400 text-sm mt-1">Painel do Motorista</p>
        </div>

        <!-- Login Form -->
        <div class="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-700">
            <div id="error-msg" class="hidden mb-4 p-3 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-sm"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <!-- API URL (colapsável) -->
                <div class="mb-4">
                    <button type="button" onclick="toggleApiConfig()" class="text-xs text-slate-500 hover:text-slate-400 flex items-center gap-1">
                        <svg id="api-toggle-icon" class="w-3 h-3 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                        Configurar servidor
                    </button>
                    <div id="api-config" class="hidden mt-2">
                        <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">URL do Servidor</label>
                        <input type="url" id="api-url" placeholder="https://seu-servidor.com"
                               class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        <p class="text-xs text-slate-500 mt-1">Ex: https://sistema.rotadoamar.com.br</p>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Usuário ou E-mail</label>
                    <input type="text" id="login" required autocomplete="username"
                           class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                           placeholder="Nome ou e-mail">
                </div>

                <div class="mb-6">
                    <label class="block text-xs font-semibold text-slate-400 uppercase mb-1">Senha</label>
                    <input type="password" id="password" required autocomplete="current-password"
                           class="w-full px-3 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                           placeholder="••••••••">
                </div>

                <button type="submit" id="btn-login"
                        class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition-colors flex items-center justify-center gap-2">
                    <span id="btn-text">Entrar</span>
                    <svg id="btn-spinner" class="hidden loading-spinner w-5 h-5" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">v260319.1 · Rota do Mar</p>
    </div>

    <script src="/motorista/js/api.js?v=260319.1"></script>
    <script>
        // Redirect if already logged in
        if (API.isAuthenticated()) {
            window.location.href = '/motorista/app.html';
        }

        // Load saved API URL
        const savedUrl = localStorage.getItem('api_base_url');
        if (savedUrl) {
            document.getElementById('api-url').value = savedUrl;
        }

        function toggleApiConfig() {
            const config = document.getElementById('api-config');
            const icon = document.getElementById('api-toggle-icon');
            config.classList.toggle('hidden');
            icon.style.transform = config.classList.contains('hidden') ? '' : 'rotate(90deg)';
        }

        async function handleLogin(e) {
            e.preventDefault();

            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value;
            const apiUrl = document.getElementById('api-url').value.trim();
            const errorEl = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnLogin = document.getElementById('btn-login');

            // Save API URL if provided
            if (apiUrl) {
                localStorage.setItem('api_base_url', apiUrl.replace(/\/+$/, ''));
                API.baseUrl = apiUrl.replace(/\/+$/, '');
            }

            errorEl.classList.add('hidden');
            btnText.textContent = 'Entrando...';
            btnSpinner.classList.remove('hidden');
            btnLogin.disabled = true;

            try {
                await API.login(login, password);
                window.location.href = '/motorista/app.html';
            } catch (err) {
                const msg = err?.data?.message || err?.data?.errors?.login?.[0] || 'Erro ao fazer login.';
                errorEl.textContent = msg;
                errorEl.classList.remove('hidden');
            } finally {
                btnText.textContent = 'Entrar';
                btnSpinner.classList.add('hidden');
                btnLogin.disabled = false;
            }
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/motorista/sw.js?v=260319.1', { scope: '/motorista/' }).catch(err => console.log('SW registration failed:', err));
        }
    </script>
</body>
</html>
